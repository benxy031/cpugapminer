# Build Windows binaries for cpugapminer
#
# Produces two artefacts:
#   1. gap_miner-win64-cpu  — CPU-only (MinGW GCC, no CUDA)
#   2. gap_miner-win64-cuda — GPU-accelerated (MinGW GCC + CUDA nvcc)
#
# Triggered on push to master or manual dispatch.
name: Windows Build

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # ───────────────────────── CPU-only build ─────────────────────────
  build-cpu:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-jansson
            mingw-w64-x86_64-openssl
            make
            bc

      - name: Build (CPU-only, WITH_RPC)
        run: make -f Makefile.mingw clean && make -f Makefile.mingw WITH_RPC=1

      - name: Build gen_crt
        run: make -f Makefile.mingw gen_crt

      - name: Collect DLLs
        run: |
          mkdir -p dist
          cp bin/gap_miner.exe dist/
          cp bin/gen_crt.exe dist/
          # Copy CRT sieve files
          cp -r crt dist/ 2>/dev/null || true

          # Auto-copy all transitive runtime DLL dependencies for built binaries.
          MINGW=/mingw64/bin
          CUDA_UNIX=""

          resolve_and_copy_deps() {
            local queue=("$@")
            local seen=""
            while [ ${#queue[@]} -gt 0 ]; do
              local pe="${queue[0]}"
              queue=("${queue[@]:1}")
              [ -f "$pe" ] || continue

              while IFS= read -r dll; do
                [ -n "$dll" ] || continue
                case " $seen " in
                  *" $dll "*) continue ;;
                esac
                seen="$seen $dll"

                local src=""
                if [ -f "$MINGW/$dll" ]; then
                  src="$MINGW/$dll"
                elif [ -n "$CUDA_UNIX" ] && [ -f "$CUDA_UNIX/bin/$dll" ]; then
                  src="$CUDA_UNIX/bin/$dll"
                else
                  continue
                fi

                cp -n "$src" dist/
                queue+=("dist/$dll")
              done < <(objdump -p "$pe" 2>/dev/null | sed -n 's/^[[:space:]]*DLL Name: //p')
            done
          }

          resolve_and_copy_deps dist/gap_miner.exe dist/gen_crt.exe

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: gap_miner-win64-cpu
          path: dist/

  # ───────────────────────── CUDA build ─────────────────────────
  build-cuda:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-jansson
            mingw-w64-x86_64-openssl
            make
            bc

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        id: cuda-toolkit
        with:
          cuda: '12.4.0'
          method: network

      - name: Build CUDA DLL (nvcc + MSVC link)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          nvcc --version
          nvcc -O3 -arch=sm_61 -gencode=arch=compute_75,code=sm_75 -gencode=arch=compute_86,code=sm_86 -gencode=arch=compute_89,code=sm_89 -DGPU_NLIMBS=16 -c src\gpu_fermat.cu -o src\gpu_fermat.obj
          link /DLL /OUT:src\gpu_fermat.dll /DEF:src\gpu_fermat.def /IMPLIB:src\gpu_fermat.lib src\gpu_fermat.obj cudart.lib /LIBPATH:"%CUDA_PATH%\lib\x64"
          dir src\gpu_fermat.*

      - name: Build (CPU + RPC, link CUDA DLL)
        shell: msys2 {0}
        run: |
          if [ -z "$CUDA_PATH" ]; then
            echo "ERROR: CUDA_PATH env var is not set"
            exit 1
          fi

          # Create MinGW import library from DLL export definitions
          dlltool -d src/gpu_fermat.def -l src/libgpu_fermat.a -D gpu_fermat.dll

          # Build everything and link against the CUDA DLL import library.
          # CUDA_DLL=1 uses the import lib instead of a raw MSVC .obj,
          # avoiding all MSVC/MinGW COFF incompatibilities.
          make -f Makefile.mingw WITH_RPC=1 WITH_CUDA=1 CUDA_DLL=1 NO_LTO=1

      - name: Build gen_crt
        run: make -f Makefile.mingw gen_crt

      - name: Collect DLLs
        run: |
          mkdir -p dist
          cp bin/gap_miner.exe dist/
          cp bin/gen_crt.exe dist/
          cp -r crt dist/ 2>/dev/null || true
          cp src/gpu_fermat.dll dist/

          MINGW=/mingw64/bin

          # Auto-copy all transitive runtime DLL dependencies for built binaries.
          CUDA_UNIX=""
          if [ -n "$CUDA_PATH" ]; then
            CUDA_UNIX=$(cygpath -u "$CUDA_PATH")
          fi

          resolve_and_copy_deps() {
            local queue=("$@")
            local seen=""
            while [ ${#queue[@]} -gt 0 ]; do
              local pe="${queue[0]}"
              queue=("${queue[@]:1}")
              [ -f "$pe" ] || continue

              while IFS= read -r dll; do
                [ -n "$dll" ] || continue
                case " $seen " in
                  *" $dll "*) continue ;;
                esac
                seen="$seen $dll"

                local src=""
                if [ -f "$MINGW/$dll" ]; then
                  src="$MINGW/$dll"
                elif [ -n "$CUDA_UNIX" ] && [ -f "$CUDA_UNIX/bin/$dll" ]; then
                  src="$CUDA_UNIX/bin/$dll"
                else
                  continue
                fi

                cp -n "$src" dist/
                queue+=("dist/$dll")
              done < <(objdump -p "$pe" 2>/dev/null | sed -n 's/^[[:space:]]*DLL Name: //p')
            done
          }

          resolve_and_copy_deps dist/gap_miner.exe dist/gen_crt.exe dist/gpu_fermat.dll

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: gap_miner-win64-cuda
          path: dist/

  # ───────────────────────── Release publishing ─────────────────────────
  publish-release-assets:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [build-cpu, build-cuda]
    steps:
      - name: Download CPU artifact
        uses: actions/download-artifact@v4
        with:
          name: gap_miner-win64-cpu
          path: release-assets/gap_miner-win64-cpu

      - name: Download CUDA artifact
        uses: actions/download-artifact@v4
        with:
          name: gap_miner-win64-cuda
          path: release-assets/gap_miner-win64-cuda

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/gap_miner-win64-cpu/**
            release-assets/gap_miner-win64-cuda/**
