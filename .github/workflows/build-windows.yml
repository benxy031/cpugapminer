# Build Windows binaries for cpugapminer
#
# Produces two artefacts:
#   1. gap_miner-win64-cpu  — CPU-only (MinGW GCC, no CUDA)
#   2. gap_miner-win64-cuda — GPU-accelerated (MinGW GCC + CUDA nvcc)
#
# Triggered on push to master or manual dispatch.
name: Windows Build

on:
  workflow_dispatch:

jobs:
  # ───────────────────────── CPU-only build ─────────────────────────
  build-cpu:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-jansson
            mingw-w64-x86_64-openssl
            make
            bc

      - name: Build (CPU-only, WITH_RPC)
        run: make -f Makefile.mingw clean && make -f Makefile.mingw WITH_RPC=1

      - name: Build gen_crt
        run: make -f Makefile.mingw gen_crt

      - name: Collect DLLs
        run: |
          mkdir -p dist
          cp bin/gap_miner.exe dist/
          cp bin/gen_crt.exe dist/
          # Copy CRT sieve files
          cp -r crt dist/ 2>/dev/null || true
          # Copy required MinGW runtime DLLs
          MINGW=/mingw64/bin
          for dll in \
            libgmp-10.dll \
            libcurl-4.dll \
            libjansson-4.dll \
            libssl-3-x64.dll \
            libcrypto-3-x64.dll \
            libgcc_s_seh-1.dll \
            libstdc++-6.dll \
            libwinpthread-1.dll \
            zlib1.dll \
            libbrotlidec.dll \
            libbrotlicommon.dll \
            libiconv-2.dll \
            libidn2-0.dll \
            libintl-8.dll \
            libnghttp2-14.dll \
            libpsl-5.dll \
            libssh2-1.dll \
            libunistring-5.dll \
            libzstd.dll \
            ; do
            [ -f "$MINGW/$dll" ] && cp "$MINGW/$dll" dist/
          done

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: gap_miner-win64-cpu
          path: dist/

  # ───────────────────────── CUDA build ─────────────────────────
  build-cuda:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-jansson
            mingw-w64-x86_64-openssl
            make
            bc

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        id: cuda-toolkit
        with:
          cuda: '12.4.0'
          method: network

      - name: Build CUDA DLL (nvcc + MSVC link)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          nvcc --version
          nvcc -O3 -arch=sm_61 -gencode=arch=compute_75,code=sm_75 -gencode=arch=compute_86,code=sm_86 -gencode=arch=compute_89,code=sm_89 -DGPU_NLIMBS=16 -c src\gpu_fermat.cu -o src\gpu_fermat.obj
          link /DLL /OUT:src\gpu_fermat.dll /DEF:src\gpu_fermat.def /IMPLIB:src\gpu_fermat.lib src\gpu_fermat.obj cudart.lib /LIBPATH:"%CUDA_PATH%\lib\x64"
          dir src\gpu_fermat.*

      - name: Build (CPU + RPC, link CUDA DLL)
        shell: msys2 {0}
        run: |
          if [ -z "$CUDA_PATH" ]; then
            echo "ERROR: CUDA_PATH env var is not set"
            exit 1
          fi

          # Create MinGW import library from DLL export definitions
          dlltool -d src/gpu_fermat.def -l src/libgpu_fermat.a -D gpu_fermat.dll

          # Build everything and link against the CUDA DLL import library.
          # CUDA_DLL=1 uses the import lib instead of a raw MSVC .obj,
          # avoiding all MSVC/MinGW COFF incompatibilities.
          make -f Makefile.mingw WITH_RPC=1 WITH_CUDA=1 CUDA_DLL=1 NO_LTO=1

      - name: Build gen_crt
        run: make -f Makefile.mingw gen_crt

      - name: Collect DLLs
        run: |
          mkdir -p dist
          cp bin/gap_miner.exe dist/
          cp bin/gen_crt.exe dist/
          cp -r crt dist/ 2>/dev/null || true

          # MinGW runtime DLLs
          MINGW=/mingw64/bin
          for dll in \
            libgmp-10.dll \
            libcurl-4.dll \
            libjansson-4.dll \
            libssl-3-x64.dll \
            libcrypto-3-x64.dll \
            libgcc_s_seh-1.dll \
            libstdc++-6.dll \
            libwinpthread-1.dll \
            zlib1.dll \
            libbrotlidec.dll \
            libbrotlicommon.dll \
            libiconv-2.dll \
            libidn2-0.dll \
            libintl-8.dll \
            libnghttp2-14.dll \
            libpsl-5.dll \
            libssh2-1.dll \
            libunistring-5.dll \
            libzstd.dll \
            ; do
            [ -f "$MINGW/$dll" ] && cp "$MINGW/$dll" dist/
          done

          # CUDA runtime DLL
          if [ -n "$CUDA_PATH" ]; then
            CUDA_UNIX=$(cygpath -u "$CUDA_PATH")
            for f in "$CUDA_UNIX"/bin/cudart64_*.dll; do
              [ -f "$f" ] && cp "$f" dist/
            done
          fi

          # GPU Fermat DLL (built by MSVC toolchain)
          cp src/gpu_fermat.dll dist/

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: gap_miner-win64-cuda
          path: dist/
