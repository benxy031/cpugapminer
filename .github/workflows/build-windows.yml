# Build Windows binaries for cpugapminer
#
# Produces one artefact:
#   1. gap_miner-win64-cpu  — CPU-only (MinGW GCC, no CUDA)
#
# Triggered on manual dispatch or release publish.
name: Windows Build

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # ───────────────────────── CPU-only build ─────────────────────────
  build-cpu:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-jansson
            mingw-w64-x86_64-openssl
            make
            bc

      - name: Build (CPU-only, WITH_RPC)
        run: make -f Makefile.mingw clean && make -f Makefile.mingw WITH_RPC=1

      - name: Build gen_crt
        run: make -f Makefile.mingw gen_crt

      - name: Collect DLLs
        run: |
          mkdir -p dist
          cp bin/gap_miner.exe dist/
          cp bin/gen_crt.exe dist/
          # Copy CRT sieve files
          cp -r crt dist/ 2>/dev/null || true

          # Auto-copy all transitive runtime DLL dependencies for built binaries.
          MINGW=/mingw64/bin

          resolve_and_copy_deps() {
            local queue=("$@")
            local seen=""
            while [ ${#queue[@]} -gt 0 ]; do
              local pe="${queue[0]}"
              queue=("${queue[@]:1}")
              [ -f "$pe" ] || continue

              while IFS= read -r dll; do
                [ -n "$dll" ] || continue
                case " $seen " in
                  *" $dll "*) continue ;;
                esac
                seen="$seen $dll"

                local src=""
                if [ -f "$MINGW/$dll" ]; then
                  src="$MINGW/$dll"
                else
                  continue
                fi

                cp -n "$src" dist/
                queue+=("dist/$dll")
              done < <(objdump -p "$pe" 2>/dev/null | sed -n 's/^[[:space:]]*DLL Name: //p')
            done
          }

          resolve_and_copy_deps dist/gap_miner.exe dist/gen_crt.exe

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: gap_miner-win64-cpu
          path: dist/

  # ───────────────────────── Release publishing ─────────────────────────
  publish-release-assets:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [build-cpu]
    steps:
      - name: Download CPU artifact
        uses: actions/download-artifact@v4
        with:
          name: gap_miner-win64-cpu
          path: release-assets/gap_miner-win64-cpu

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/gap_miner-win64-cpu/**
