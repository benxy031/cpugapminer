# Build Windows binaries for cpugapminer
#
# Produces two artefacts:
#   1. gap_miner-win64-cpu   — CPU-only (MinGW GCC, no CUDA)
#   2. gap_miner-win64-cuda  — CUDA GPU + CPU (nvcc DLL + MinGW)
#
# CUDA strategy: compile gpu_fermat.dll with nvcc/MSVC toolchain,
# create a MinGW-compatible import library (libgpu_fermat.a) via dlltool,
# then build gap_miner.exe with MinGW linking against that import lib.
# This avoids all MSVC/MinGW COFF incompatibility issues.
#
# Triggered on manual dispatch or release publish.
name: Windows Build

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # ───────────────────────── CPU-only build ─────────────────────────
  build-cpu:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-jansson
            mingw-w64-x86_64-openssl
            make
            bc

      - name: Build (CPU-only, WITH_RPC)
        run: make -f Makefile.mingw clean && make -f Makefile.mingw WITH_RPC=1

      - name: Build gen_crt
        run: make -f Makefile.mingw gen_crt

      - name: Collect DLLs
        run: |
          mkdir -p dist
          cp bin/gap_miner.exe dist/
          cp bin/gen_crt.exe dist/
          # Copy CRT sieve files
          cp -r crt dist/ 2>/dev/null || true

          # Auto-copy all transitive runtime DLL dependencies for built binaries.
          MINGW=/mingw64/bin

          resolve_and_copy_deps() {
            local queue=("$@")
            local seen=""
            while [ ${#queue[@]} -gt 0 ]; do
              local pe="${queue[0]}"
              queue=("${queue[@]:1}")
              [ -f "$pe" ] || continue

              while IFS= read -r dll; do
                [ -n "$dll" ] || continue
                case " $seen " in
                  *" $dll "*) continue ;;
                esac
                seen="$seen $dll"

                local src=""
                if [ -f "$MINGW/$dll" ]; then
                  src="$MINGW/$dll"
                else
                  continue
                fi

                cp -n "$src" dist/
                queue+=("dist/$dll")
              done < <(objdump -p "$pe" 2>/dev/null | sed -n 's/^[[:space:]]*DLL Name: //p')
            done
          }

          resolve_and_copy_deps dist/gap_miner.exe dist/gen_crt.exe

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: gap_miner-win64-cpu
          path: dist/

  # ─────────────────────────── CUDA build ───────────────────────────
  build-cuda:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.15
        id: cuda-toolkit
        with:
          cuda: '12.4.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cuda_profiler_api"]'

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-jansson
            mingw-w64-x86_64-openssl
            make
            bc

      - name: Create MinGW import library for gpu_fermat.dll
        shell: msys2 {0}
        run: dlltool --dllname gpu_fermat.dll -d src/gpu_fermat.def -l src/libgpu_fermat.a

      - name: Build CUDA kernel DLL (nvcc + MSVC)
        shell: pwsh
        run: |
          $nvcc = "$env:CUDA_PATH\bin\nvcc.exe"
          # Compile for Pascal (sm_61 = GTX 1050 Ti), Turing (sm_75),
          # Ampere (sm_86) + PTX fallback for newer hardware.
          & $nvcc -O3 `
            -gencode arch=compute_61,code=sm_61 `
            -gencode arch=compute_75,code=sm_75 `
            -gencode arch=compute_86,code=sm_86 `
            -gencode arch=compute_61,code=compute_61 `
            -DGPU_NLIMBS=16 `
            --shared `
            -Xlinker "/DEF:src\gpu_fermat.def" `
            -o src/gpu_fermat.dll `
            src/gpu_fermat.cu
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Build gap_miner (WITH_RPC + CUDA DLL mode)
        shell: msys2 {0}
        run: make -f Makefile.mingw clean && make -f Makefile.mingw WITH_RPC=1 WITH_CUDA=1 CUDA_DLL=1 GPU_BITS=1024

      - name: Build gen_crt
        shell: msys2 {0}
        run: make -f Makefile.mingw gen_crt

      - name: Collect DLLs
        shell: msys2 {0}
        run: |
          mkdir -p dist-cuda
          cp bin/gap_miner.exe dist-cuda/
          cp bin/gen_crt.exe   dist-cuda/
          cp src/gpu_fermat.dll dist-cuda/
          cp -r crt dist-cuda/ 2>/dev/null || true

          # Copy cudart DLL from CUDA toolkit installation
          CUDA_UNIX=$(cygpath -u "$CUDA_PATH")
          cp "$CUDA_UNIX/bin/cudart64_"*.dll dist-cuda/ 2>/dev/null || true

          # Auto-copy all transitive MinGW runtime DLL dependencies.
          MINGW=/mingw64/bin

          resolve_and_copy_deps() {
            local queue=("$@")
            local seen=""
            while [ ${#queue[@]} -gt 0 ]; do
              local pe="${queue[0]}"
              queue=("${queue[@]:1}")
              [ -f "$pe" ] || continue

              while IFS= read -r dll; do
                [ -n "$dll" ] || continue
                case " $seen " in
                  *" $dll "*) continue ;;
                esac
                seen="$seen $dll"

                local src=""
                if [ -f "$MINGW/$dll" ]; then
                  src="$MINGW/$dll"
                else
                  continue
                fi

                cp -n "$src" dist-cuda/
                queue+=("dist-cuda/$dll")
              done < <(objdump -p "$pe" 2>/dev/null | sed -n 's/^[[:space:]]*DLL Name: //p')
            done
          }

          resolve_and_copy_deps dist-cuda/gap_miner.exe dist-cuda/gen_crt.exe

      - name: Upload CUDA artefact
        uses: actions/upload-artifact@v4
        with:
          name: gap_miner-win64-cuda
          path: dist-cuda/

  # ───────────────────────── Release publishing ─────────────────────────
  publish-release-assets:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [build-cpu, build-cuda]
    steps:
      - name: Download CPU artifact
        uses: actions/download-artifact@v4
        with:
          name: gap_miner-win64-cpu
          path: release-assets/gap_miner-win64-cpu

      - name: Download CUDA artifact
        uses: actions/download-artifact@v4
        with:
          name: gap_miner-win64-cuda
          path: release-assets/gap_miner-win64-cuda

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/gap_miner-win64-cpu/**
            release-assets/gap_miner-win64-cuda/**
